const iP = o => o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100);
const fmt = o => o==null?”—”:o>0?`+${o}`:`${o}`;

const calcIH = s => Math.max(-1,Math.min(1,
0.18*s.rlm+0.16*s.steam+0.15*s.sharpDiv+0.12*s.polyDiverg+
0.15*s.clvExpect+0.08*s.refProfile-0.10*s.socialNoise-
0.08*s.fatigue-0.06*s.weather-0.08*Math.abs(s.lmTripwire)

// Guardian Win Probability — your model vs the market
function calcGWP(bet, game, ih=0) {
const side = bet.side===“home”?“home”:bet.side===“away”?“away”:bet.side;
const mktP = iP(bet.odds);
const fair = mktP/1.045; // remove vig
const mom  = game.momentum?.[side]??0.5;
const stk  = game.playoffStake?.[side]??0.5;
const pub  = (game.publicPct??50)/100;
const lm   = game.lineMove??0;
const sharpWith = (game.sharpMoney??””).split(”,”).map(s=>s.trim()).includes(side);
const sharpAgainst = (game.sharpMoney??””).length>0 && !sharpWith;
const inj  = (game.injuries?.[side]?.length??0);
const dMom   = (mom-0.5)*0.18;
const dStake = (stk-0.5)*0.12;
const dSharp = sharpWith?0.055:sharpAgainst?-0.04:0;
const dLine  = Math.sign(lm)===(side===“away”?1:-1)?Math.abs(lm)*0.015:-Math.abs(lm)*0.008;
const dPub   = sharpWith&&pub>0.65?(pub-0.65)*0.20:pub>0.65?-(pub-0.65)*0.12:0;
const dIH    = Math.max(-1,Math.min(1,ih))*0.06;
const dInj   = -inj*0.03;
const gwp = Math.max(0.05,Math.min(0.95,fair+dMom+dStake+dSharp+dLine+dPub+dIH+dInj));
const edge = +((gwp-mktP)*100).toFixed(1);
return { gwp:+(gwp*100).toFixed(1), mktP:+(mktP*100).toFixed(1), edge, dMom,dStake,dSharp,dLine,dPub,dIH,dInj };
}

// True Kelly from YOUR edge (not market price)
function trueKelly(bankroll, gwpObj, odds) {
const edge = gwpObj.edge/100;
if(edge<=0) return { stake:5, kellyPct:0 };
const dec = odds>0?1+odds/100:1+100/Math.abs(odds);
const fullK = edge/(dec-1);
const qK = Math.min(0.04, fullK*0.25);
return { stake:+Math.max(5,bankroll*qK).toFixed(2), kellyPct:+(qK*100).toFixed(2) };
}

// Score a bet — GBS drives action label, GWP drives stake size
function scoreBet(bet, game, user, ih=0) {
if(!bet.odds) return { gbs:0, action:“BLOCK” };
const side = bet.side===“home”?“home”:bet.side===“away”?“away”:bet.side;
const gwpR = calcGWP(bet, game, ih);
const edge = gwpR.edge;
const mom  = game.momentum?.[side]??0.5;
const stk  = game.playoffStake?.[side]??0.5;
const pub  = (game.publicPct??50)/100;
const shp  = (game.sharpMoney??””).includes(side)?0.14:(game.sharpMoney?.length>0?-0.06:0);
const inj  = Math.min(0.4,(game.injuries?.[side]?.length??0)*0.10);
const lm   = game.lineMove??0;
const E = Math.min(1,Math.max(0,0.5+edge/100*3.0));
const T = Math.min(1,Math.max(0,0.5+lm*0.06));
const M = Math.min(1,Math.max(0,0.5+shp-(pub>0.80?0.08:0)));
const C = Math.min(1,mom*0.45+stk*0.35+E*0.20);
const P = Math.min(1,user.drift*0.25+(1-M)*0.20+(1-mom)*0.20);
const D = Math.min(1,Math.max(0,user.drift*0.60));
const V = Math.min(1,inj);
const raw = 0.30*E+0.12*T+0.20*M+0.24*C-0.07*P-0.05*D-0.04*V;
const ihM = 1+Math.max(-0.2,Math.min(0.4,ih))*0.30;
const arcB = ARC[bet.arc]&&raw*115*ihM>=50?4:0;
const gbs = Math.min(100,Math.round(raw*115*ihM)+arcB);
let action = gbs>=58?“APPROVE”:gbs>=44?“WATCHLIST”:gbs>=32?“REDUCE”:“BLOCK”;
if(user.drift>0.80||ih<-0.5) action=“BLOCK”;
else if(inj>=0.35||user.lossStreak>=5) action=“REDUCE”;
else if(edge<=-2) action=“BLOCK”;
const kelly = trueKelly(user.bankroll, gwpR, bet.odds);
return { gbs, action, …gwpR, kellyStake:kelly.stake, kellyPct:kelly.kellyPct };
}

// Split allocation across multiple plays (edge-proportional, 8% total cap)
function splitAlloc(plays, bankroll) {
const withEdge = plays.filter(p=>p.sc.edge>0);
const totalEdge = withEdge.reduce((s,p)=>s+p.sc.edge,0)||1;
const cap = bankroll*0.08;
return plays.map(p=>{
const share = Math.max(0,p.sc.edge)/totalEdge;
const raw = cap*share;
return {…p, splitStake:+Math.max(5,Math.min(bankroll*0.03,raw)).toFixed(2), splitPct:+(share*100).toFixed(0)};
});
}

// Score every bet in slate
function scoreAll(user, ih) {
return GAMES.flatMap(g=>g.bets.map(b=>{
const sc = scoreBet(b, g, user, ih);
return {…b, sc, game:g, gameName:`${g.away} vs ${g.home}`};
})).sort((a,b)=>b.sc.edge-a.sc.edge);
}

// Top plays (APPROVE+WATCHLIST, 1 per game, split-allocated)
function topPlays(user, ih, max=6) {
const all = scoreAll(user, ih).filter(b=>b.sc.action===“APPROVE”||b.sc.action===“WATCHLIST”);
const seen=new Set(), out=[];
for(const b of all){ if(!seen.has(b.game.id)){seen.add(b.game.id);out.push(b);} if(out.length>=max)break; }
return splitAlloc(out, user.bankroll);
}

// $1M compounding path
function calcMillionPath(bankroll, targetDays=30, dailyROI=0.08) {
const days=[];
let bal=bankroll;
for(let d=1;d<=targetDays;d++){
bal=bal*(1+dailyROI);
days.push({day:d,bal:+bal.toFixed(2)});
}
return days;
}
function requiredDailyROI(bankroll, target, days) {
return Math.pow(target/bankroll, 1/days)-1;
}

async function fetchLive() {
const gnames = GAMES.slice(0,6).map(g=>`${g.away} vs ${g.home}`).join(”, “);
const prompt = `Sports betting intel. Return ONLY valid JSON, no markdown. Today: ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',year:'numeric'})}. Games: ${gnames}. Search ESPN, ActionNetwork, Rotowire, Covers, OddsShark. Return: {"ts":"ISO","alerts":[],"ih":{"rlm":0.35,"steam":0.45,"sharpDiv":0.30,"polyDiverg":0.15,"clvExpect":0.40,"socialNoise":0.20,"fatigue":0.10,"weather":0.0,"refProfile":0.15,"lmTripwire":0.10},"narrative":"2 sentences sharp money today"} ih values must be floats -1.0 to 1.0.`;
const r = await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:800,tools:[{type:“web_search_20250305”,name:“web_search”}],messages:[{role:“user”,content:prompt}]})});
const d=await r.json();
const txt=(d.content||[]).filter(b=>b.type===“text”).map(b=>b.text).join(””);
const clean=txt.replace(/`json|`/g,””).trim();
const s=clean.indexOf(”{”),e=clean.lastIndexOf(”}”);
if(s===-1)return null;
return JSON.parse(clean.slice(s,e+1));
}

// ── STYLES ────────────────────────────────────────────────────────────────────
const AC = a=>({
APPROVE:  {c:”#00d97e”,bg:”#001f14”,e:“✅”},
WATCHLIST:{c:”#4488ff”,bg:”#001428”,e:“👁”},
REDUCE:   {c:”#fbbf24”,bg:”#1f1600”,e:“⚠️”},
BLOCK:    {c:”#ef4444”,bg:”#1a0000”,e:“🚫”},
}[a]||{c:”#666”,bg:”#111”,e:”—”});
const edgeC = e => e>=10?”#00d97e”:e>=5?”#a3e635”:e>=2?”#fbbf24”:e>0?”#fb923c”:”#ef4444”;
const fmt2 = n => n>=1e6?”$”+( n/1e6).toFixed(2)+“M”:n>=1e3?”$”+(n/1e3).toFixed(1)+“K”:”$”+n.toFixed(0);

// ── RING ──────────────────────────────────────────────────────────────────────
function Ring({score,action,size=52}){
const st=AC(action);
const r=size*.38,c=size/2,ci=2*Math.PI*r,d=(score/100)*ci;
return(<div style={{position:“relative”,width:size,height:size,flexShrink:0}}>
<svg width={size} height={size} style={{transform:“rotate(-90deg)”}}>
<circle cx={c} cy={c} r={r} fill="none" stroke="#111128" strokeWidth={size*.075}/>
<circle cx={c} cy={c} r={r} fill=“none” stroke={st.c} strokeWidth={size*.075} strokeDasharray={`${d} ${ci}`} strokeLinecap=“round”/>
</svg>
<div style={{position:“absolute”,top:“50%”,left:“50%”,transform:“translate(-50%,-50%)”,textAlign:“center”,lineHeight:1}}>
<div style={{fontSize:size*.24,fontWeight:900,color:st.c}}>{score}</div>
<div style={{fontSize:size*.10,color:st.c+“77”}}>GBS</div>
</div>

  </div>);
}

// ── EDGE BADGE — the one number that tells everything ─────────────────────────
function EdgeBadge({edge,size=“md”}){

}
